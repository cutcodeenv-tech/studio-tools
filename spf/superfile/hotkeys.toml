##############################################
#                                            #
#           Superfile Configuration          #
#                                            #
##############################################

# This contains the hotkey config file for superfile! More details can be found at
# https://superfile.dev/configure/custom-hotkeys/.

###############################################################################
#                                Global hotkeys                               #
###############################################################################

# Note: These hotkeys should be unique.

#-- Basic Actions
confirm = ['enter', 'right', 'l', 'д']
cd_quit = ['Q', 'Й']
quit = ['q', 'esc', 'й']

#-- Navigation
list_down = ['down', 'j', 'о']
list_up = ['up', 'k', 'л']
page_down = ['pgdown','']
page_up = ['pgup','']

#-- File Panel Controls
close_file_panel = ['w', 'ц']
create_new_file_panel = ['n', 'т']
next_file_panel = ['tab', 'L', 'Д']
open_sort_options_menu = ['o', 'щ']
pinned_directory = ['P', 'З']
previous_file_panel = ['shift+left', 'H', 'Р']
toggle_file_preview_panel = ['f', 'а']
toggle_reverse_sort = ['R', 'К']

#-- Focus Manipulation
focus_on_metadata = ['m', 'ь']
focus_on_process_bar = ['p', 'з']
focus_on_sidebar = ['s', 'ы']

#-- File/Dir Creation/Renaming
file_panel_item_create = ['ctrl+n', '']
file_panel_item_rename = ['ctrl+r', '']

#-- Main File Operations
copy_items = ['ctrl+c', '']
cut_items = ['ctrl+x', '']
delete_items = ['ctrl+d', 'delete', '']
paste_items = ['ctrl+v', 'ctrl+w', '']
permanently_delete_items = ['D', 'В']

#-- Archive Manipulation
compress_file = ['ctrl+a', '']
extract_file = ['ctrl+e', '']

#-- Editor Actions
open_current_directory_with_editor = ['E', 'У']
open_file_with_editor = ['e', 'у']

#-- Other Actions
change_panel_mode = ['v', 'м']
copy_path = ['ctrl+p', '']
copy_present_working_directory = ['c', 'с']
open_command_line = [':', 'Ж']
open_help_menu = ['?', '']
open_spf_prompt = ['>', '']
open_zoxide = ['z', 'я']
toggle_dot_file = ['.', 'ю']
toggle_footer = ['F', 'А']

###############################################################################
#                                Typing hotkeys                               #
###############################################################################

# Note: These hotkeys can override all hotkeys.

confirm_typing = ['enter', '']
cancel_typing = ['ctrl+c', 'esc']

###############################################################################
#                            Mode-Specific Hotkeys                            #
###############################################################################

# Note: These hotkeys can conflict with other modes, but not with global
# hotkeys.

#-- Normal Mode Actions
parent_directory = ['h', 'left', 'backspace', 'р']
search_bar = ['/', '.']

#-- Selection Mode Actions
file_panel_select_mode_items_select_down = ['shift+down', 'J', 'О']
file_panel_select_mode_items_select_up = ['shift+up', 'K', 'Л']
file_panel_select_all_items = ['A', 'Ф']
